<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Offline Map</title>
    <link rel="stylesheet" href="./leaflet/leaflet.css" />
    <style>
      html,
      body,
      #mapContainer {
        width: 100%;
        height: 100%;
      }

      #mapContainer {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="mapContainer"></div>
    <script src="./leaflet/leaflet.js"></script>
    <script>
      (function () {
        const search = new URLSearchParams(window.location.search || '')
        const port = Number(search.get('port')) || 18888
        const minZoom = Number(search.get('minZoom')) || 9
        const maxZoom = Number(search.get('maxZoom')) || 17
        const zoom = Number(search.get('zoom')) || 12
        const defaultCenter = [39.9087, 116.3975]

        console.log('[MapHTML] URL 参数: port=%s minZoom=%d maxZoom=%d zoom=%d', port, minZoom, maxZoom, zoom)

        let map = null
        let tileLayer = null
        let consecutiveTileErrors = 0
        let tileErrorReported = false
        let initialized = false

        function postToApp(payload) {
          try {
            if (window.uni && typeof uni.postMessage === 'function') {
              uni.postMessage({ data: payload })
              return
            }
          } catch (error) {
            console.warn('[MapHTML] uni.postMessage 失败:', error)
          }

          try {
            if (window.parent && typeof window.parent.postMessage === 'function') {
              window.parent.postMessage({ data: payload }, '*')
              return
            }
          } catch (error) {
            console.warn('[MapHTML] parent.postMessage 失败:', error)
          }

          try {
            const currentWebview = window.plus && plus.webview && plus.webview.currentWebview ? plus.webview.currentWebview() : null
            const opener = currentWebview && typeof currentWebview.opener === 'function' ? currentWebview.opener() : null
            if (opener && typeof opener.evalJS === 'function') {
              opener.evalJS(`window.__handleMapMessage && window.__handleMapMessage(${JSON.stringify(payload)})`)
            }
          } catch (error) {
            console.warn('[MapHTML] 原生消息发送失败:', error)
          }
        }

        function initMap() {
          if (initialized) {
            return
          }

          initialized = true
          console.log('[MapHTML] 初始化 Leaflet, options:', JSON.stringify({ minZoom, maxZoom, zoom, center: defaultCenter }))
          console.log('[MapHTML] tileUrl: http://localhost:%d/{z}/{x}/{y}.png', port)

          if (!window.L) {
            console.error('[MapHTML] Leaflet 资源未加载')
            postToApp({
              action: 'tileerror',
              message: 'Leaflet 资源未加载'
            })
            return
          }

          map = L.map('mapContainer', {
            minZoom,
            maxZoom,
            zoom,
            center: defaultCenter,
            zoomControl: true,
            attributionControl: false,
            crs: L.CRS.EPSG3857
          })

          tileLayer = L.tileLayer(`http://localhost:${port}/{z}/{x}/{y}.png`, {
            tms: true,
            minZoom,
            maxZoom,
            errorTileUrl: ''
          }).addTo(map)

          console.log('[MapHTML] tileLayer 创建完成, 添加到 map')

          tileLayer.on('tileload', function () {
            consecutiveTileErrors = 0
          })

          tileLayer.on('tileerror', function (event) {
            consecutiveTileErrors += 1
            console.warn('[MapHTML] tileLayer tileerror #%d: url=%s', consecutiveTileErrors, event && event.url ? event.url : '')

            if (consecutiveTileErrors >= 3 && !tileErrorReported) {
              tileErrorReported = true
              console.warn('[MapHTML] tileLayer 连续 %d 次失败, 发送 tileerror 给 uni-app', consecutiveTileErrors)
              postToApp({
                action: 'tileerror',
                message: '瓦片数据不可用，请检查存储路径'
              })
            }
          })

          window.moveTo = function (lat, lng, nextZoom) {
            const resolvedLat = Number(lat)
            const resolvedLng = Number(lng)
            const resolvedZoom = Number.isFinite(Number(nextZoom)) ? Number(nextZoom) : map.getZoom()

            if (!Number.isFinite(resolvedLat) || !Number.isFinite(resolvedLng)) {
              return
            }

            console.log('[MapHTML] moveTo: lat=%f lng=%f zoom=%d', resolvedLat, resolvedLng, resolvedZoom)
            map.setView([resolvedLat, resolvedLng], resolvedZoom)
          }

          window.addEventListener('resize', function () {
            console.log('[MapHTML] 窗口 resize, invalidateSize')
            if (map) {
              map.invalidateSize()
            }
          })
        }

        document.addEventListener('UniAppJSBridgeReady', function () {
          console.log('[MapHTML] UniAppJSBridgeReady 触发')
        })

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          setTimeout(initMap, 0)
        } else {
          document.addEventListener('DOMContentLoaded', initMap, false)
        }

        window.addEventListener('load', initMap, false)
      })()
    </script>
  </body>
</html>
